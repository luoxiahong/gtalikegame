name: Wdrazanie Dema na GitHub Pages

on:
  push:
    branches: ["main"] # Wyzwala wdrożenie po wypchnięciu do gałęzi main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Instalacja Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalacja zależności
        run: npm ci

      - name: Budowanie projektu
        run: npm run build

      - name: Konfiguracja GitHub Pages
        uses: actions/configure-pages@v4

      - name: Pakowanie artefaktu (Katalog z buildem)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './src/dist' 

      - name: Publikacja na github.io
        id: deployment
        uses: actions/deploy-pages@v4
