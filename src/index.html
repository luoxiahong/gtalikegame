<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GTA JS - Refaktoryzacja Systemowa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <canvas id="gameCanvas3D" width="800" height="600" style="display: none;"></canvas>
        <!-- Warstwa UI poza canvasem - lepsza wydajność i łatwiejsze zarządzanie tekstem -->
        <canvas id="minimap" width="130" height="130" style="position: absolute; top: 20px; left: 20px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.25); background: rgba(0,0,0,0.65); box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 11; display: none; pointer-events: none;"></canvas>
        <div id="uiLayer"></div>
        <div id="menuLayer"></div>
        <div id="mobileHUD">
            <div class="hud-btn" id="btnUp">W</div>
            <div class="hud-btn" id="btnLeft">A</div>
            <div class="hud-btn" id="btnRight">D</div>
            <div class="hud-btn" id="btnDown">S</div>
            <div class="hud-btn" id="btnAction">F</div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>

</html>
